<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Recibo de Orçamento</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    .ticket {
        max-width: 600px;
        margin: 30px auto;
        border-top: 5px solid #0d6efd;
    }
    @media print {
        .btn-print { display: none; }
    }
  </style>
</head>
<body class="bg-light">
<div class="container">
  <div class="card ticket shadow">
    <div class="card-body">
      <div class="text-center mb-4">
        <h2 class="text-primary">OFICINA JAVA</h2>
        <p class="text-muted">Orçamento de Prestação de Serviços</p>
      </div>

      <table class="table table-borderless">
        <tr>
          <th scope="row">Cliente:</th>
          <td th:text="${orcamento.cliente}">Nome do Cliente</td>
        </tr>
        <tr>
          <th scope="row">Veículo:</th>
          <td th:text="${orcamento.veiculo}">Modelo do Carro</td>
        </tr>
      </table>

      <div class="bg-light p-3 rounded mb-4">
        <h5>Descrição do Serviço:</h5>
        <p th:text="${orcamento.descricao}">Detalhes do que será feito...</p>
      </div>

      <div class="d-flex justify-content-between align-items-center">
        <h4>Total Estimado:</h4>
        <h2 class="text-success">R$ <span th:text="${orcamento.valor}">0.00</span></h2>
      </div>

      <hr>
      <div class="d-grid gap-2 mt-4">
        <button onclick="window.print()" class="btn btn-outline-primary btn-print">🖨️ Imprimir Orçamento</button>
        <a href="/orcamento" class="btn btn-link text-decoration-none">Voltar e criar novo</a>
      </div>
    </div>
  </div>
</div>
</body>
</html>
