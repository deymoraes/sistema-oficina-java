<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Lista de Orçamentos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5">
<div class="d-flex justify-content-between mb-4">
    <h2>Orçamentos da Oficina</h2>
    <a href="/orcamento" class="btn btn-primary">Novo Orçamento</a>
</div>

<table class="table table-striped table-bordered">
    <thead class="table-dark">
    <tr>
        <th>ID</th>
        <th>Cliente</th>
        <th>Veículo</th>
        <th>Total (R$)</th>
        <th>Ações</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="o : ${orcamentos}">
    <tr th:each="o : ${orcamentos}">
        <td th:text="${o.id}"></td>
        <td th:text="${o.cliente}"></td>
        <td th:text="${o.veiculo}"></td>
        <td th:text="${#numbers.formatCurrency(o.valorTotal)}"></td>
        <td>
            <a th:href="@{/excluir/{id}(id=${o.id})}" class="btn btn-danger btn-sm">Excluir</a>
        </td>
    </tr>
    </tbody>
</table>
</body>
</html>
