<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Imprimir Orçamento</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        @media print { .no-print { display: none; } body { padding: 20px; } }
        .border-bottom-2 { border-bottom: 2px solid #333; }
    </style>
</head>
<body class="container mt-4" onload="window.print()">

<div class="text-end no-print mb-4">
    <button onclick="window.print()" class="btn btn-primary">Imprimir</button>
    <a href="/lista" class="btn btn-secondary">Voltar</a>
</div>

<div class="card p-4 shadow-sm" th:if="${orcamento.id != null}">
    <div class="row border-bottom-2 pb-3 mb-4">
        <div class="col-6">
            <h2 class="fw-bold text-uppercase">Oficina Java</h2>
        </div>
        <div class="col-6 text-end">
            <h3>Orçamento Nº [[${orcamento.id}]]</h3>
        </div>
    </div>

    <div class="row mb-4">
        <div class="col-12">
            <p><strong>Cliente:</strong> [[${orcamento.cliente}]] | <strong>Veículo:</strong> [[${orcamento.veiculo}]] | <strong>Placa:</strong> [[${orcamento.placa}]]</p>
        </div>
    </div>

    <table class="table table-bordered">
        <thead class="table-light">
        <tr>
            <th>Descrição</th>
            <th class="text-center">Qtd</th>
            <th class="text-end">Unitário</th>
            <th class="text-end">Subtotal</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="item : ${orcamento.itens}">
            <td th:text="${item.descricao}"></td>
            <td class="text-center" th:text="${item.quantidade}"></td>
            <td class="text-end" th:text="${#numbers.formatCurrency(item.valorUnitario)}"></td>
            <td class="text-end" th:text="${#numbers.formatCurrency(item.quantidade * item.valorUnitario)}"></td>
        </tr>
        </tbody>
        <tfoot>
        <tr class="fw-bold">
            <td colspan="3" class="text-end">TOTAL:</td>
            <td class="text-end text-primary" th:text="${#numbers.formatCurrency(orcamento.valorTotal)}"></td>
        </tr>
        </tfoot>
    </table>
</div>

<div th:if="${orcamento.id == null}" class="alert alert-danger text-center mt-5">
    <h4>Orçamento não encontrado!</h4>
    <p>Verifique se o ID está correto ou volte para a lista.</p>
</div>
</body>
</html>
