<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Lista de Orçamentos - Oficina</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="card shadow">
        <div class="card-header bg-dark text-white d-flex justify-content-between align-items-center">
            <h4 class="mb-0">Gerenciamento de Orçamentos</h4>
            <a href="/orcamento" class="btn btn-success btn-sm">
                <i class="bi bi-plus-circle"></i> Novo Orçamento
            </a>
        </div>
        <div class="card-body p-0">
            <table class="table table-hover table-bordered mb-0">
                <thead class="table-secondary">
                <tr>
                    <th style="width: 80px;" class="text-center">ID</th>
                    <th>Cliente</th>
                    <th>Veículo / Placa</th>
                    <th class="text-end">Total Geral</th>
                    <th class="text-center" style="width: 250px;">Ações</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="o : ${orcamentos}">
                    <td th:text="${o.id}" class="text-center fw-bold"></td>
                    <td th:text="${o.cliente}"></td>
                    <td>
                        <span th:text="${o.veiculo}"></span>
                        <small class="text-muted" th:if="${o.placa != null}" th:text="'(' + ${o.placa} + ')'"></small>
                    </td>
                    <td class="text-end fw-bold text-success">
                        R$ <span th:text="${o.valorTotal}"></span>
                    </td>
                    <td class="text-center">
                        <a th:href="@{/imprimir/{id}(id=${o.id})}" class="btn btn-sm btn-info text-white me-1">
                            <i class="bi bi-printer"></i> Imprimir
                        </a>
                        <a th:href="@{/excluir/{id}(id=${o.id})}" class="btn btn-sm btn-danger" onclick="return confirm('Apagar orçamento?')">
                            <i class="bi bi-trash"></i> Excluir
                        </a>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(orcamentos)}">
                    <td colspan="5" class="text-center text-muted py-4">Nenhum orçamento cadastrado na oficina.</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
</body>
</html>
