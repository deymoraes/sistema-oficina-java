<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Histórico de Orçamentos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="text-primary">📋 Histórico de Orçamentos</h2>
        <a href="/orcamento" class="btn btn-success">+ Novo Orçamento</a>
    </div>

    <div class="card shadow border-0">
        <div class="card-body p-4">
            <table class="table table-hover">
                <thead class="table-dark">
                <tr>
                    <th>ID</th>
                    <th>Cliente</th>
                    <th>Veículo</th>
                    <th>Valor</th>
                    <th class="text-center">Ações</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="o : ${orcamentos}">
                    <td th:text="${o.id}">1</td>
                    <td th:text="${o.cliente}">Nome</td>
                    <td th:text="${o.veiculo}">Carro</td>
                    <td class="fw-bold text-success" th:text="'R$ ' + ${o.valor}">0.00</td>
                    <td class="text-center">
                        <a th:href="@{/excluir/{id}(id=${o.id})}"
                           class="btn btn-sm btn-danger"
                           onclick="return confirm('Tem certeza que deseja apagar?')">
                            Excluir
                        </a>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
</body>
</html>
