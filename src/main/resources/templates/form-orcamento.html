<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Lista de Orçamentos - Oficina Java</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body class="bg-light">

<div class="container mt-5">
  <div class="card shadow">
    <div class="card-header bg-dark text-white d-flex justify-content-between align-items-center">
      <h4 class="mb-0">Gerenciamento de Orçamentos</h4>
      <a href="/orcamento" class="btn btn-success btn-sm">
        <i class="bi bi-plus-circle"></i> Novo Orçamento
      </a>
    </div>
    <div class="card-body">

      <table class="table table-hover table-bordered mb-0">
        <thead class="table-secondary">
        <tr>
          <th style="width: 80px;">ID</th>
          <th>Cliente</th>
          <th>Veículo / Placa</th>
          <th class="text-end">Total Geral</th>
          <th class="text-center" style="width: 250px;">Ações</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="o : ${orcamentos}">
          <td th:text="${o.id}" class="fw-bold"></td>
          <td th:text="${o.cliente}"></td>
          <td>
            <span th:text="${o.veiculo}"></span>
            <small class="text-muted" th:text="'(' + ${o.placa} + ')'"></small>
          </td>
          <td class="text-end fw-bold text-primary">
            [[${#numbers.formatCurrency(o.valorTotal)}]]
          </td>
          <td class="text-center">
            <a th:href="@{/imprimir/{id
