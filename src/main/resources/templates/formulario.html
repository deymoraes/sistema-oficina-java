<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Oficina - Novo Orçamento</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5">
    <div class="card shadow">
        <div class="card-header bg-primary text-white">
            <h2 class="mb-0">Sistema de Orçamentos - Oficina</h2>
        </div>
        <div class="card-body">
            <form th:action="@{/salvar}" th:object="${orcamento}" method="post">
                <div class="mb-3">
                    <label class="form-label">Nome do Cliente</label>
                    <input type="text" class="form-control" th:field="*{cliente}" placeholder="Ex: João Silva">
                </div>
                <div class="mb-3">
                    <label class="form-label">Veículo</label>
                    <input type="text" class="form-control" th:field="*{veiculo}" placeholder="Ex: Gol Quadrado">
                </div>
                <div class="mb-3">
                    <label class="form-label">Descrição do Serviço</label>
                    <textarea class="form-control" rows="3" th:field="*{descricao}"></textarea>
                </div>
                <div class="mb-3">
                    <label class="form-label">Valor Total (R$)</label>
                    <input type="number" step="0.01" class="form-control" th:field="*{valor}">
                </div>
                <button type="submit" class="btn btn-success w-100">Gerar Orçamento Profissional</button>
            </form>
        </div>
    </div>
</div>
</body>
</html>
